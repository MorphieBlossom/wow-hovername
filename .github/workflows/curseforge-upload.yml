name: Upload release to CurseForge

# When a GitHub release is published, take the zip already attached to that
# release and push it to CurseForge's upload API. Nothing is rebuilt here —
# build.ps1 produced the zip locally and it rode along on the release, so CI
# is purely "grab the asset, resolve game versions, upload".
#
# This workflow is IDENTICAL across the MorphieBlossom addon family — all the
# per-addon config lives in the TOC files:
#   * The release tag's major (first number) picks the flavor via
#     FLAVOR_BY_MAJOR (each expansion has its own "_Suffix" TOC; the current
#     live Retail expansion, 12, uses the base no-suffix TOC).
#   * That flavor's TOC provides the CurseForge project id (X-Curse-Project-ID)
#     and its `## Interface:` line lists the exact patches to tag on CurseForge.
# An addon that doesn't ship a flavor simply has no TOC for it, so that major
# never resolves for it (e.g. Meower has no _Mists TOC).
on:
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      # Check out first — it's needed to read the TOC, and it must run BEFORE
      # the asset download: this step cleans the workspace, which would
      # otherwise wipe the untracked zip we download into ./dist.
      - name: Checkout source (for TOC metadata)
        uses: actions/checkout@v4

      # Pull every *.zip asset off the published release into ./dist.
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "$REPO" --pattern '*.zip' --dir ./dist
          if [ -z "$(ls -A ./dist/*.zip 2>/dev/null)" ]; then
            echo "::error::No .zip assets found on release $TAG"; exit 1
          fi
          echo "Downloaded assets:"; ls -1 ./dist/*.zip

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          RELEASE_BODY: ${{ github.event.release.body }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # WoW major version -> flavor (the TOC suffix build.ps1 uses). The
          # release tag's first number picks the flavor from this list. Each
          # expansion has its own "_Suffix" TOC; the current live Retail
          # expansion (12) uses the base no-suffix TOC. An addon only ships TOCs
          # for the flavors it targets; other majors resolve to a TOC it lacks
          # and are never released under. Add major 14+ when a new one ships.
          declare -A FLAVOR_BY_MAJOR=(
            [1]="_Classic"       # Classic (Vanilla)
            [2]="_TBC"           # The Burning Crusade
            [3]="_Wrath"         # Wrath of the Lich King
            [4]="_Cata"          # Cataclysm
            [5]="_Mists"         # Mists of Pandaria
            [6]="_WOD"           # Warlords of Draenor
            [7]="_Legion"        # Legion
            [8]="_BFA"           # Battle for Azeroth
            [9]="_Shadowlands"   # Shadowlands
            [10]="_Dragonflight" # Dragonflight
            [11]="_TWW"          # The War Within
            [12]=""              # Midnight (current Retail)
            [13]=""              # The Last Titan
          )

          # Base addon name = the TOC whose stem has no "_" flavor suffix.
          BASE_TOC="$(ls src/*.toc | grep -vE '/[^/]*_[^/]*\.toc$' | head -1)"
          PROJECT="$(basename "$BASE_TOC" .toc)"

          tag_major="${TAG#v}"; tag_major="${tag_major%%.*}"
          suffix="${FLAVOR_BY_MAJOR[$tag_major]-__none__}"
          if [ "$suffix" = "__none__" ]; then
            echo "::error::No flavor mapped for WoW major '$tag_major' (release tag $TAG). Add it to FLAVOR_BY_MAJOR."; exit 1
          fi
          dashed="${suffix//_/-}"                    # "" (retail) or e.g. "-Mists"
          label="${suffix#_}"; label="${label:-retail}"
          toc="src/${PROJECT}${suffix}.toc"
          if [ ! -f "$toc" ]; then
            echo "::error::flavor $label selected (major $tag_major) but $toc not found — this addon doesn't ship that flavor."; exit 1
          fi
          echo "Addon: $PROJECT | tag: $TAG | major $tag_major -> flavor $label ($toc)"

          # Find the flavor's zip by the suffix build.ps1 appends (retail: none).
          zip=""
          for z in dist/*.zip; do
            rest="$(basename "$z" .zip)"; rest="${rest#"${PROJECT}-v"}"
            if [[ "$rest" =~ ^[0-9.]+"${dashed}"$ ]]; then zip="$z"; fi
          done
          if [ -z "$zip" ]; then
            echo "::error::flavor $label: no matching asset (${PROJECT}-v*${dashed}.zip) attached to the release."; exit 1
          fi

          pid="$(grep -m1 -oP '##\s*X-Curse-Project-ID:\s*\K[0-9]+' "$toc" || true)"
          if [ -z "$pid" ]; then echo "::error::no X-Curse-Project-ID in $toc"; exit 1; fi
          interfaces="$(grep -m1 -oP '##\s*Interface:\s*\K.*' "$toc" || true)"
          if [ -z "$interfaces" ]; then echo "::error::no Interface line in $toc"; exit 1; fi

          # CurseForge wants numeric gameVersion IDs, not the interface number
          # or the "12.0.7" string. Decode each patch on the TOC's Interface
          # line and match it against /api/game/versions. A patch not yet live
          # on CurseForge is warned-and-skipped rather than fatal.
          VERSIONS="$(curl -fsSL -H "X-Api-Token: $CF_API_KEY" \
            https://wow.curseforge.com/api/game/versions)"
          ids="[]"
          IFS=',' read -ra nums <<< "$interfaces"
          for raw in "${nums[@]}"; do
            n="$(echo "$raw" | tr -dc '0-9')"; [ -z "$n" ] && continue
            # Interface number MMmmpp -> major.minor.patch
            ver="$(( n / 10000 )).$(( (n / 100) % 100 )).$(( n % 100 ))"
            id="$(echo "$VERSIONS" | jq -r --arg p "$ver" \
              'map(select(.name == $p)) | .[0].id // empty')"
            if [ -n "$id" ]; then
              ids="$(echo "$ids" | jq --argjson x "$id" '. + [$x]')"
              echo "  $ver (interface $n) -> $id"
            else
              echo "::warning::no CurseForge game version named '$ver' (interface $n); skipping. Is that patch live on CurseForge yet?"
            fi
          done
          ids="$(echo "$ids" | jq -c 'unique')"
          if [ "$ids" = "[]" ]; then
            echo "::error::none of the interface versions matched a CurseForge game version"; exit 1
          fi

          jq -n \
            --arg cl "${RELEASE_BODY:-}" \
            --argjson gv "$ids" \
            '{changelog: $cl, changelogType: "markdown", releaseType: "release", gameVersions: $gv}' \
            > metadata.json

          echo "Uploading $zip (flavor $label) -> project $pid, game versions $ids"
          curl -fsSL -X POST \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata=<metadata.json" \
            -F "file=@$zip" \
            "https://wow.curseforge.com/api/projects/$pid/upload-file"
          echo "Done."
